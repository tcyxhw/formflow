# Runtime Benchmarks V1
# Defines minimal benchmark scenarios for task/checkpoint/release-check runtime paths

schema_version: "1.0"
description: "Minimal benchmark scenarios for runtime automation V1"

# ============================================================
# TASK BENCHMARKS
# ============================================================
task:
  - id: T1
    name: "Lite profile task"
    description: "Small style fix task"
    command: "python3 scripts/prepare_task_context.py --task \"修复表单组件样式问题\" --lite"
    expected:
      profile: "Lite"
      task_context_exists: true
      task_capsule_exists: true
      predicted_domains_nonempty: true
      routing_planner: "planner-lite"
    checks:
      - field: "profile"
        equals: "Lite"
      - field: "routing.planner_agent"
        equals: "planner-lite"

  - id: T2
    name: "Normal/Contract profile task"
    description: "API + TypeScript contract change"
    command: "python3 scripts/prepare_task_context.py --task \"修改用户表单API并同步前端Typescript类型\""
    expected:
      profile: ["Normal", "Strict"]
      task_context_exists: true
      task_capsule_exists: true
      predicted_domains_contains: "contract"
    checks:
      - field: "profile"
        in: ["Normal", "Strict"]
      - field: "predicted_domains"
        contains: "contract"

  - id: T3
    name: "Strict/Risk profile task"
    description: "Permission delete risk task"
    command: "python3 scripts/prepare_task_context.py --task \"修复权限删除时关联记录未清理的问题\""
    expected:
      profile: "Strict"
      task_context_exists: true
      task_capsule_exists: true
      routing_planner: "planner-strict"
    checks:
      - field: "profile"
        equals: "Strict"
      - field: "routing.planner_agent"
        equals: "planner-strict"

  - id: T4
    name: "Style-only task should be frontend only"
    description: "Style/UI task should not trigger backend"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      predicted_domains_contains: "frontend"
      predicted_domains_not_contains: "backend"
    checks:
      - field: "predicted_domains"
        contains: "frontend"
      - field: "predicted_domains"
        not_contains: "backend"

  - id: T5
    name: "Permission delete triggers risk domain"
    description: "Permission/security tasks should trigger risk domain"
    command: "python3 scripts/prepare_task_context.py --task \"修复权限删除时关联记录未清理的问题\""
    expected:
      predicted_domains_contains: "risk"
    checks:
      - field: "predicted_domains"
        contains: "risk"

  - id: T6
    name: "Fallback field exists"
    description: "Task context should have fallback field"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      fallback_field_exists: true
    checks:
      - field: "fallback.used"
        equals: false
      - field: "fallback.reasons"
        is_array: true

  - id: T7
    name: "Edit scope fields exist"
    description: "Task context should have edit_scope with expected fields"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      edit_scope_exists: true
      edit_scope_expansion_risk: true
      edit_scope_budget: true
    checks:
      - field: "edit_scope.expansion_risk"
        nonempty: true
      - field: "edit_scope.max_edit_budget.max_files"
        nonempty: true
      - field: "edit_scope.max_edit_budget.max_changed_lines"
        nonempty: true

  - id: T8
    name: "Validation plan fields exist"
    description: "Task context should have validation_plan with local/targeted/global"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      validation_plan_exists: true
    checks:
      - field: "validation_plan.local_checks"
        is_array: true
      - field: "validation_plan.targeted_checks"
        is_array: true
      - field: "validation_plan.global_checks"
        is_array: true

  - id: T9
    name: "Repair control fields exist"
    description: "Task context should have repair_control with loop count and stop loss"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      repair_control_exists: true
    checks:
      - field: "repair_control.repair_loop_count"
        equals: 0
      - field: "repair_control.root_cause_revalidated"
        equals: false
      - field: "repair_control.stop_loss_triggered"
        equals: false

  - id: T10
    name: "Repair mode fields exist"
    description: "Task context should have repair_mode with enabled and target fields"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      repair_mode_exists: true
    checks:
      - field: "repair_mode.enabled"
        equals: false
      - field: "repair_mode.target_error"
        equals: ""
      - field: "repair_mode.target_scope"
        equals: ""
      - field: "repair_mode.repair_loop_count"
        equals: 0
      - field: "repair_mode.root_cause_revalidated"
        equals: false
      - field: "repair_mode.stop_loss_triggered"
        equals: false

  - id: T11
    name: "Repair summary fields exist"
    description: "Task context should have repair_summary with fix point structure"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      repair_summary_exists: true
    checks:
      - field: "repair_summary.error_symptom"
        equals: ""
      - field: "repair_summary.suspected_root_cause"
        equals: ""
      - field: "repair_summary.minimal_fix_point"
        equals: ""
      - field: "repair_summary.do_not_expand_to"
        is_array: true
      - field: "repair_summary.local_checks"
        is_array: true
      - field: "repair_summary.targeted_checks"
        is_array: true

  - id: T12
    name: "Repair budget fields exist"
    description: "Task context should have repair_budget with max limits"
    command: "python3 scripts/prepare_task_context.py --task \"修复按钮样式问题\""
    expected:
      repair_budget_exists: true
    checks:
      - field: "repair_budget.max_files"
        equals: 2
      - field: "repair_budget.max_changed_lines"
        equals: 80

# ============================================================
# CHECKPOINT BENCHMARKS
# ============================================================
checkpoint:
  - id: C1
    name: "Lite staged change"
    description: "Small staged change (no real staged files needed)"
    setup: "python3 scripts/prepare_checkpoint_context.py --staged"
    expected:
      profile: ["Lite", "Normal", "Strict"]
      checkpoint_context_exists: true
      checkpoint_capsule_exists: true
    checks:
      - field: "profile"
        in: ["Lite", "Normal", "Strict"]
      - exists: "checkpoint_context.json"
      - exists: "checkpoint_capsule.md"

  - id: C2
    name: "Contract staged change"
    description: "Schema/API staged change detection"
    setup: "python3 scripts/prepare_checkpoint_context.py --staged --mode checkpoint"
    expected:
      triggered_domains_nonempty: true
    checks:
      - exists: "checkpoint_context.json"

  - id: C3
    name: "Risk staged change"
    description: "Security/permission staged change detection"
    setup: "python3 scripts/prepare_checkpoint_context.py --staged --mode checkpoint"
    expected:
      profile: ["Normal", "Strict"]
    checks:
      - exists: "checkpoint_context.json"

  - id: C4
    name: "Checkpoint fallback field exists"
    description: "Checkpoint context should have fallback field"
    setup: "python3 scripts/prepare_checkpoint_context.py --staged"
    expected:
      fallback_field_exists: true
    checks:
      - field: "fallback.used"
        equals: false
      - field: "fallback.reasons"
        is_array: true

# ============================================================
# RELEASE-CHECK BENCHMARKS
# ============================================================
release_check:
  - id: R1
    name: "Backend branch diff"
    description: "Backend-only branch diff"
    setup: "python3 scripts/prepare_checkpoint_context.py --mode release-check --base-ref origin/main"
    expected:
      release_context_exists: true
      release_capsule_exists: true
    checks:
      - exists: "release_check_context.json"
      - exists: "release_check_capsule.md"

  - id: R2
    name: "Schema/Contract branch diff"
    description: "Schema change detection"
    setup: "python3 scripts/prepare_checkpoint_context.py --mode release-check --base-ref origin/main"
    expected:
      profile: ["Normal", "Strict"]
    checks:
      - exists: "release_check_context.json"

  - id: R3
    name: "Security/Migration branch diff"
    description: "Risk domain detection"
    setup: "python3 scripts/prepare_checkpoint_context.py --mode release-check --base-ref origin/main"
    expected:
      profile: ["Normal", "Strict"]
    checks:
      - exists: "release_check_context.json"

  - id: R4
    name: "Release-check fallback field exists"
    description: "Release-check context should have fallback field"
    setup: "python3 scripts/prepare_checkpoint_context.py --mode release-check --base-ref origin/main"
    expected:
      fallback_field_exists: true
    checks:
      - field: "fallback.used"
        equals: false
      - field: "fallback.reasons"
        is_array: true
